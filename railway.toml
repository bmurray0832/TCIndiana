[deploy]
healthcheckPath = "/login"
# Apply pending Prisma migrations before each deploy goes live.
preDeployCommand = "npx prisma migrate deploy"

# Weekly digest — Monday 9 AM Eastern (14:00 UTC during standard time).
# Each active user gets a personalised list of who to follow up with.
[[crons]]
schedule = "0 14 * * 1"
endpoint = "/api/cron/weekly-digest"

# Monthly lapsed-donor list to org admins — first of the month 10 AM Eastern.
[[crons]]
schedule = "0 15 1 * *"
endpoint = "/api/cron/lapsed-donors"
